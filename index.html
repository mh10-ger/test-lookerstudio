<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Looker Studio Report</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 24px;
      color: #333;
      font-size: 1.5rem;
    }

    .report-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 24px;
      width: 100%;
      max-width: 1860px;
    }

    iframe {
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>Looker Studio Report</h1>
  <div class="report-container">
    <iframe
      width="1800"
      height="600"
      src="https://datastudio.google.com/embed/reporting/69fe91fd-2c8d-4516-bf4b-2d862f0b56a4/page/p_8n0b4x8j3d"
      frameborder="0"
      style="border:0"
      allowfullscreen
      sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
    </iframe>
  </div>
</body>
</html>
